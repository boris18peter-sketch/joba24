<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעבד תשלום...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f5fb;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e4eaf5;
      border-top-color: #1a6fd4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title {
      font-size: 18px; font-weight: 800; color: #0d1e40;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px; color: #4b6083; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <div class="title">מעבד את התשלום...</div>
    <div class="subtitle">מעדכן את יתרת הקרדיטים שלך</div>
  </div>
  <script>
    (function() {
      // Extract ALL query parameters from the URL
      var params = {};
      var search = window.location.search.substring(1);
      if (search) {
        var pairs = search.split('&');
        for (var i = 0; i < pairs.length; i++) {
          var pair = pairs[i].split('=');
          var key = decodeURIComponent(pair[0] || '');
          var value = decodeURIComponent(pair[1] || '');
          if (key) params[key] = value;
        }
      }

      // Relay the transaction result to the parent window (the app)
      window.parent.postMessage({
        source: 'tranzila-callback',
        params: params
      }, '*');
    })();
  </script>
</html>
