<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5, minimum-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="true" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Joba24" />
    <meta name="mobile-web-app-capable" content="true" />
    <meta name="theme-color" content="#0f2b6b" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />
    <link rel="icon" type="image/jpeg" href="https://media.base44.com/images/public/69e6bdb4986a04a256653a23/d5824a161_IMG_0357.jpg" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/69e6bdb4986a04a256653a23/d5824a161_IMG_0357.jpg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Joba24 — משימות מהירות</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #f4f7fb; }
      body { padding-top: max(0px, env(safe-area-inset-top)); padding-bottom: max(0px, env(safe-area-inset-bottom)); padding-left: max(0px, env(safe-area-inset-left)); padding-right: max(0px, env(safe-area-inset-right)); }
      #root { width: 100%; height: 100%; display: flex; flex-direction: column; }
      /* Inline skeleton — shown instantly until React mounts */
      .preload-header { width:100%; height:56px; background:#fff; display:flex; align-items:center; padding:0 16px; box-sizing:border-box; flex-shrink:0; }
      .preload-logo { width:36px; height:36px; border-radius:10px; background:#e8edf5; }
      .preload-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
      .preload-spinner { width:36px; height:36px; border-radius:50%; border:3px solid #e8edf5; border-top-color:#1a6fd4; animation:preload-spin .8s linear infinite; }
      .preload-text { font-family:-apple-system,BlinkMacSystemFont,sans-serif; font-size:14px; color:#94a3b8; font-weight:500; }
      @keyframes preload-spin { to{transform:rotate(360deg)} }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="preload-header"><div class="preload-logo"></div></div>
      <div class="preload-body">
        <div class="preload-spinner"></div>
        <div class="preload-text">טוען...</div>
      </div>
    </div>
    <!-- Firebase is loaded on-demand via lib/fcm.js — no blocking CDN scripts on initial load -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
