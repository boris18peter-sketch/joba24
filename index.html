<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5, minimum-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="true" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Joba24" />
    <meta name="mobile-web-app-capable" content="true" />
    <meta name="theme-color" content="#0f2b6b" />
    <link rel="icon" type="image/jpeg" href="https://media.base44.com/images/public/69e6bdb4986a04a256653a23/d5824a161_IMG_0357.jpg" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/69e6bdb4986a04a256653a23/d5824a161_IMG_0357.jpg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Joba24 — משימות מהירות</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
      body { padding-top: max(0px, env(safe-area-inset-top)); padding-bottom: max(0px, env(safe-area-inset-bottom)); padding-left: max(0px, env(safe-area-inset-left)); padding-right: max(0px, env(safe-area-inset-right)); }
      #root { width: 100%; height: 100%; display: flex; flex-direction: column; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Firebase Messaging compat SDK — loaded from CDN to avoid Vite pre-bundling -->
    <script>
      (function loadFirebase() {
        function initApp() {
          try {
            firebase.initializeApp({
              apiKey: "AIzaSyD4GmTgh-fFEyBzrv6bHN8PyKvOKFHC_wc",
              authDomain: "joba24.firebaseapp.com",
              projectId: "joba24",
              storageBucket: "joba24.firebasestorage.app",
              messagingSenderId: "79738163466",
              appId: "1:79738163466:web:a7fea9dd112a0909bfeaf3",
            });
          } catch(e) { /* already initialized */ }
        }
        function registerSW() {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/firebase-messaging-sw.js')
              .then(function(reg) { console.log('FCM SW registered:', reg.scope); })
              .catch(function(err) { console.log('FCM SW registration failed:', err); });
          }
        }
        var appScript = document.createElement('script');
        appScript.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
        appScript.onload = function() {
          var msgScript = document.createElement('script');
          msgScript.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js';
          msgScript.onload = function() {
            initApp();
            registerSW();
          };
          msgScript.onerror = function() { registerSW(); };
          document.head.appendChild(msgScript);
        };
        appScript.onerror = function() { registerSW(); };
        document.head.appendChild(appScript);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
